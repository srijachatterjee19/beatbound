events {}

http {
  server {
    listen 80:80;

    location / {
      proxy_pass http://frontend-service:80/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/backend/ {
      proxy_pass http://backend-service:5000/;
    }

    location /api/flask {
      proxy_pass http://flask-service:8000/;
    }
  }
}